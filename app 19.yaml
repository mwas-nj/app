# docker-compose.yml
version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: omni-shop-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

  backend:
    build: ./server
    container_name: omni-shop-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password@mongodb:27017/omni-shop?authSource=admin
    volumes:
      - ./server:/app
      - /app/node_modules

  frontend:
    build: ./client
    container_name: omni-shop-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  admin:
    build: ./admin
    container_name: omni-shop-admin
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  mongodb_data: